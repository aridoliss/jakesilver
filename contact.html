<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | Jake Silver</title>

    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script>

</head>

<body>

    <!-- ===========================
         Navigation
    ============================ -->

    <header>

        <nav class="navbar">

            <div class="logo">
                Jake Silver
            </div>

            <ul class="nav-links">

                <li>
                    <a href="index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a href="showcase.html">
                        Showcase
                    </a>
                </li>

                <li>
                    <a class="active" href="contact.html">
                        Contact
                    </a>
                </li>

            </ul>

        </nav>

    </header>


    <!-- ===========================
         Hero
    ============================ -->

    <section class="hero small-hero">

        <div class="hero-content">

            <h1>
                Contact Us
            </h1>

        </div>

    </section>


    <!-- ===========================
         Contact Section
    ============================ -->

    <section class="section">

        <div class="contact-grid">


            <!-- Contact Information -->

            <div class="contact-info">

                <h3>
                    Contact Information
                </h3>


                <p>
                    <strong>
                        Email:
                    </strong>
                    N/A
                </p>


                <p>
                    <strong>
                        Discord:
                    </strong>
                    aridoliss
                </p>

                <p>
                    <strong>
                        Location:
                    </strong>
                    Australia
                </p>


                <p>
                    Contact me to speak about hiring.
                </p>


            </div>



            <!-- Contact Form -->

            <form class="contact-form">


                <label for="name">
                    Name
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Your name"
                    required
                >



                <label for="email">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="your@email.com"
                    required
                >



                <label for="message">
                    Message
                </label>

                <textarea
                    id="message"
                    name="message"
                    placeholder="Write your message..."
                    required>
                </textarea>



                <button
                    class="button"
                    type="submit">
                    
                    Send Message

                </button>


            </form>


        </div>

    </section>


    <!-- ===========================
         Footer
    ============================ -->

    <footer>

        <p>
            © 2026 Jake Silver
        </p>

    </footer>


</body>

</html>
